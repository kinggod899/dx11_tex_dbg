name: Build DX11 Tex Dbg

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: |
        $sln = Get-ChildItem -Filter *.sln -Depth 1 | Select-Object -First 1
        if (-not $sln) { $sln = Get-ChildItem -Filter *.sln -Recurse | Where-Object { $_.FullName -notlike "*\libs\*" } | Select-Object -First 1 }
        if ($sln) {
          nuget restore $sln.FullName
        }

    - name: Build Solution
      run: |
        # 自动过滤掉 libs 文件夹内的干扰 sln 喵！
        $sln = Get-ChildItem -Filter *.sln -Depth 1 | Select-Object -First 1
        if (-not $sln) { $sln = Get-ChildItem -Filter *.sln -Recurse | Where-Object { $_.FullName -notlike "*\libs\*" } | Select-Object -First 1 }
        
        if ($sln) {
          echo "Found main solution: $($sln.FullName), building..."
          msbuild /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 $($sln.FullName)
        } else {
          echo "No root .sln file found. Trying CMake..."
          if (Test-Path CMakeLists.txt) {
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release
          } else {
            echo "Error: Neither Visual Studio Solution (*.sln) nor CMakeLists.txt was found!"
            exit 1
          }
        }

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dx11_tex_dbg-binary
        path: |
          **/Release/*.exe
          **/Release/*.dll
          build/Release/*.exe
          build/Release/*.dll
        if-no-files-found: warn
