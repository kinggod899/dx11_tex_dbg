name: Build DX11 Tex Dbg

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 支持手动点击按钮触发编译喵！

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # 自动拉取可能存在的子模块喵

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: |
        if (Test-Path **/*.sln) {
          nuget restore (Get-ChildItem -Filter *.sln -Recurse).FullName
        }

    - name: Build Solution
      run: |
        $sln = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($sln) {
          echo "Found solution: $($sln.FullName), building..."
          msbuild /p:Configuration=Release /p:Platform=x64 $($sln.FullName)
        } else {
          echo "No .sln file found. Trying CMake..."
          if (Test-Path CMakeLists.txt) {
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release
          } else {
            echo "Error: Neither Visual Studio Solution (*.sln) nor CMakeLists.txt was found!"
            exit 1
          }
        }

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dx11_tex_dbg-binary
        path: |
          **/Release/*.exe
          **/Release/*.dll
          build/Release/*.exe
          build/Release/*.dll
        if-no-files-found: warn
